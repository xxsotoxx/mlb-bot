<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Betting Bot - Predicciones Avanzadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            background-attachment: fixed;
            color: #ffffff; 
            min-height: 100vh;
        }
        .card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 12px;
            color: #ffffff;
        }
        
        .card-header {
            background-color: #1a1a2e;
            border-bottom: 1px solid #30363d;
            color: #ffffff;
        }
        
        .card-body {
            color: #ffffff;
        }
        
        .card-title, .card-text {
            color: #ffffff;
        }
        .btn-primary { background-color: #238636; border-color: #238636; }
        .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
        .btn-outline-secondary { color: #d1d5da; border-color: #30363d; }
        .btn-outline-secondary:hover { color: #ffffff; }
        .text-success { color: #3fb950 !important; }
        .text-danger { color: #f85149 !important; }
        .text-warning { color: #d29922 !important; }
        .text-primary { color: #58a6ff !important; }
        .text-info { color: #79c0ff !important; }
        .text-muted { color: #ffffff !important; opacity: 0.8; }
        .text-secondary { color: #d1d5da !important; }
        
        .badge-high { background-color: #238636; }
        .badge-medium { background-color: #d29922; }
        .badge-low { background-color: #6e7681; }
        
        .game-card { 
            margin-bottom: 1.5rem; 
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .game-card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .game-card .card-header {
            border-bottom: 1px solid #30363d;
        }
        
        .prediction-main {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
        }
        
        .prediction-score {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
        }
        
        .team-away, .team-home {
            flex: 1;
            max-width: 250px;
        }
        
        .score-display {
            text-align: center;
        }
        
        .final-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .score-num {
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        
        .score-sep {
            font-size: 3rem;
            color: #ffffff;
        }
        
        .pitcher-stats {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .pitcher-stats .badge {
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .prediction-details {
            background-color: #21262d;
        }
        
        .prediction-details .border-end {
            border-color: #30363d !important;
        }
        
        .prob-bar {
            margin-top: 0.75rem;
        }
        
        .prob-track {
            height: 12px;
            background: linear-gradient(90deg, #f85149 0%, #f85149 var(--away-width, 50%), #238636 var(--away-width, 50%), #238636 100%);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }
        
        .prob-fill-away, .prob-fill-home {
            position: absolute;
            top: 0;
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .prob-fill-away {
            left: 0;
            background: rgba(248, 81, 73, 0.6);
        }
        
        .prob-fill-home {
            right: 0;
            background: rgba(35, 134, 54, 0.6);
        }
        
        .prob-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .ou-comparison {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .ou-casino, .ou-prediction {
            text-align: center;
        }
        
        .ou-vs {
            color: #ffffff;
            font-size: 0.9rem;
        }
        
        .ou-recommendation {
            font-size: 1.1rem;
        }
        
        .ou-recommendation .badge {
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-item small {
            display: block;
            color: #ffffff;
            font-size: 0.75rem;
        }
        
        .stat-item strong {
            font-size: 1.1rem;
            color: #fff;
        }
        
        .loading-spinner { display: none; }
        
        .alert-info {
            background-color: #161b22;
            border-color: #30363d;
            color: #58a6ff;
        }
        
        .alert-danger {
            background-color: #161b22;
            border-color: #f85149;
            color: #f85149;
        }
        
        h1, h2, h3, h4, h5, h6 {
            color: #ffffff;
        }
        
        .small, small {
            color: #ffffff;
        }
        
        .table-dark {
            --bs-table-bg: #21262d;
            color: #ffffff;
        }
        
        .table-dark th {
            color: #ffffff;
            background-color: #161b22;
            border-color: #30363d;
        }
        
        .table-dark td {
            color: #ffffff;
            border-color: #30363d;
            vertical-align: middle;
        }
        
        .table-dark tbody tr:hover {
            background-color: #30363d;
        }
        
        .nav-link {
            color: #ffffff !important;
        }
        
        .nav-link:hover {
            color: #58a6ff !important;
        }
        
        @media (max-width: 768px) {
            .prediction-score {
                flex-direction: column;
                gap: 1rem;
            }
            .score-num {
                font-size: 3rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .modal-content {
            color: #ffffff;
        }
        
        .modal-header {
            border-bottom: 1px solid #30363d;
        }
        
        .modal-footer {
            border-top: 1px solid #30363d;
        }
        
        .form-label {
            color: #ffffff;
        }
        
        .form-control {
            background-color: #21262d;
            color: #ffffff;
            border-color: #30363d;
        }
        
        .form-control:focus {
            background-color: #21262d;
            color: #ffffff;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #161b22; border-bottom: 1px solid #30363d;">
        <div class="container">
            <a class="navbar-brand" href="/" style="color: #ffffff;">
                <i class="bi bi-baseball"></i> MLB Betting Bot
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="bi bi-calendar-event"></i> Partidos</a>
                <a class="nav-link" href="/dashboard"><i class="bi bi-graph-up"></i> Dashboard</a>
                <a class="nav-link" href="/analysis"><i class="bi bi-bar-chart"></i> Estadísticas</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
