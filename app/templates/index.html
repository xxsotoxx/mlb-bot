{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-12 text-center">
        <div class="mb-3">
            <i class="bi bi-graph-up-arrow" style="font-size: 3rem; color: #3fb950;"></i>
        </div>
        <h1 class="mb-2" style="color: #ffffff;">MLB Predicciones Avanzadas</h1>
        <p class="text-muted" id="current-date"></p>
        <p class="small" style="color: #d1d5da;">
            <i class="bi bi-info-circle"></i> Análisis con sabermetría avanzada, estadísticas de abridores y bullpen
        </p>
    </div>
</div>

<div class="row mb-4">
    <div class="col-12 text-center">
        <button class="btn btn-primary btn-lg px-5" id="btn-consultar" onclick="consultarPartidos()">
            <i class="bi bi-lightning-charge"></i> Obtener Predicciones de Hoy
        </button>
        <div class="spinner-border text-light loading-spinner mt-3" id="loading-spinner" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>
</div>

<div class="row mb-3">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-list-ul"></i> Partidos del Día</h4>
            <small class="text-muted" id="games-count"></small>
        </div>
    </div>
</div>

<div id="games-container" class="row"></div>

    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color: #161b22; color: #ffffff;">
                <div class="modal-header" style="background-color: #1a1a2e; color: #ffffff;">
                    <h5 class="modal-title" style="color: #ffffff;">Registrar Resultado</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="color: #ffffff;">
                    <p id="modal-game-info" style="color: #ffffff;"></p>
                    <div class="row">
                        <div class="col-6">
                            <label class="form-label" style="color: #ffffff;">Carreras Local</label>
                            <input type="number" class="form-control" id="home-score" min="0" value="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label" style="color: #ffffff;">Carreras Visitante</label>
                            <input type="number" class="form-control" id="away-score" min="0" value="0">
                        </div>
                    </div>
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="registrarResultado()">Guardar</button>
            </div>
        </div>
    </div>
</div>
{% block scripts %}
<script src="/static/js/main.js"></script>
{% endblock %}
{% endblock %}
